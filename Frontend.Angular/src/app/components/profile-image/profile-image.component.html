<div class="profile-image">
    <!-- Display the image if available -->
    <img *ngIf="showImage" [src]="profileImage" alt="Profile Photo" />
  
    <!-- Display initials if no image is available -->
    <div *ngIf="showInitials" class="initials">{{ getInitials() }}</div>
  
    <!-- Display a placeholder (e.g., spinner) while data is being fetched -->
    <div *ngIf="!showImage && !showInitials" class="loading-placeholder">
      Loading...
    </div>
  </div>
